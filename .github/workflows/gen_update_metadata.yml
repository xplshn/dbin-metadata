name: Generate Metadata

on:
  workflow_dispatch:
    inputs:
      allow_large_size_loss:
        description: 'Allow committing files with size loss >= 500 KB (warning only)'
        type: boolean
        default: false
  schedule:
    - cron: "0,30 * * * *"

jobs:
  gen-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: xplshn/dbin-metadata
      BRANCH: master

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl jq zstd gzip
        shell: sh

      - name: Clone dbin Repository (shallow)
        run: |
          git clone --depth=1 https://github.com/xplshn/dbin
        shell: sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Prepare Directories
        run: |
          mkdir -p out
        shell: sh

      - name: Run Metadata Generators
        run: |
          run_generator() {
            local folder="$1" generator_path="$2"
            local outdir="out/$folder"
            mkdir -p "$outdir"
            cd "dbin/$generator_path" || return 1
            go run . && {
              echo "Generator $folder succeeded"
              find . -type f \( -name '*.json' -o -name '*.yaml' -o -name '*.cbor' \) -exec cp --parents {} "../../$outdir/" \;
            }
            cd - >/dev/null
          }

          run_generator "1.3" "misc/cmd/dbinRepoIndexGenerators/1.3"
          run_generator "1.4" "misc/cmd/dbinRepoIndexGenerators/1.4"
          run_generator "1.5" "misc/cmd/dbinRepoIndexGenerators/1.5"
          run_generator "1.6" "misc/cmd/dbinRepoIndexGenerators/1.6"
          run_generator "flatpakAppStreamScrapper" "misc/cmd/flatpakAppStreamScrapper"
          run_generator "modMetadata" "misc/cmd/modMetadata"
          run_generator "modMetadata-ng" "misc/cmd/modMetadata-ng"
        shell: sh

      - name: Upload Changed Files to dbin-metadata (via API)
        run: |
          upload_if_changed() {
            local file="$1"
            local relpath="${file#out/}"
            local encoded content_sha remote_info
            echo "Processing: $relpath"

            # Try fetching existing file metadata
            remote_info=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/$REPO/contents/$relpath?ref=$BRANCH")

            # Skip if content is unchanged
            remote_sha=$(echo "$remote_info" | jq -r '.sha')
            remote_content=$(echo "$remote_info" | jq -r '.content' | base64 -d 2>/dev/null || echo "")
            local_content=$(cat "$file")

            [ "$remote_content" = "$local_content" ] && {
              echo "Unchanged: $relpath"
              return
            }

            echo "Uploading: $relpath"
            encoded=$(base64 -w 0 "$file")

            curl -s -X PUT -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "message": "Update '"$relpath"'",
                "content": "'"$encoded"'",
                "branch": "'"$BRANCH"'",
                "sha": "'"$remote_sha"'"
              }' \
              "https://api.github.com/repos/$REPO/contents/$relpath"
          }
          find out/ -type f | while IFS= read -r file; do
              upload_if_changed "$file"
          done
        shell: sh
