name: 🐧🧬 Generate Metadata 🖳🧬

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"  # Every 30 minutes

jobs:
  gen-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: master
          filter: "blob:none"

      - name: Setup Environment Variables
        run: |
          SYSTMP=$(dirname $(mktemp -u))
          USER_AGENT=$(curl -sL 'https://pub.ajam.dev/repos/Azathothas/Wordlists/Misc/User-Agents/ua_chrome_macos_latest.txt')
          echo "SYSTMP=$SYSTMP" >> $GITHUB_ENV
          echo "USER_AGENT=$USER_AGENT" >> $GITHUB_ENV
        shell: sh

      - name: Install Golang
        run: |
          mkdir -p /tmp/go-install
          curl -sL "https://git.io/go-installer" | bash -s -- -v latest -i /tmp/go-install
          echo "PATH=/tmp/go-install/bin:$PATH" >> $GITHUB_ENV
        shell: sh

      - name: Run Metadata Generators
        run: |
          run_generator() {
            SCRIPT_URL="$1"
            FOLDER_NAME="$2"

            mkdir -p "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME"
            curl -sL "$SCRIPT_URL" -o "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME/main.go"
            cd "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME" || { echo "Failed to change directory"; exit 1; }

            go mod init "github.com/xplshn/$FOLDER_NAME" && go mod tidy
            go run ./main.go

            # Check if JSON files were generated
            if find . -name "*.json" -type f -size +0b | grep -q .; then
              echo "HAS_META=TRUE" >> $GITHUB_ENV
            else
              echo "HAS_META=FALSE" >> $GITHUB_ENV
            fi

            # Clean up intermediate files
            find . -type f ! -name "*.json" -delete
          }

          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/modMetadataAIO/modMetadataAIO.go" "modMetadataAIO" || { echo "Failed to generate modMetadataAIO metadata"; exit 1; }
          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/modMetadataAIO-ng/modMetadataAIO-ng.go" "modMetadataAIO-ng" || { echo "Failed to generate modMetadataAIO-ng metadata"; exit 1; }
          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/AM-support/meta-to-am.go" "AM-support" || { echo "Failed to generate AM-support metadata"; exit 1; }
        shell: sh

      - name: Check Commit Numbers and Reset if Necessary
        if: env.HAS_META == 'TRUE'
        run: |
          git fetch --depth=1
          COMMIT_NUMS=$(git rev-list --count HEAD)

          if [ "$COMMIT_NUMS" -gt 70 ]; then
            git checkout --orphan temp
            git add --all
            git commit -m "Reset ALL Commits (Re:Init)"
            git branch -D master
            git branch -m master
            git push origin master --force
            echo "RESET_HISTORY=YES" >> $GITHUB_ENV
          else
            echo "RESET_HISTORY=NO" >> $GITHUB_ENV
          fi
        shell: sh

      - name: Get DateTime
        if: env.HAS_META == 'TRUE'
        run: |
          UTC_TIME=$(TZ='UTC' date +'%Y-%m-%d (%I:%M:%S %p)')
          echo "UTC_TIME=$UTC_TIME" >> $GITHUB_ENV
        shell: sh

      - uses: stefanzweifel/git-auto-commit-action@v5
        if: env.HAS_META == 'TRUE'
        with:
          repository: ./master
          commit_user_name: xplshn
          commit_user_email: xplshn@murena.io
          commit_message: "✅ Updated (Metadata) 🛍️🧬 <-- ${{ env.UTC_TIME }} ⌚"

      - name: Exit & Fail if Metadata Generation Failed
        if: env.HAS_META == 'FALSE'
        run: |
          echo "Metadata generation failed. No new metadata found." 
          exit 0
        shell: sh
