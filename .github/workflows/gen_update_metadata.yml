name: Generate Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: xplshn/dbin-metadata
      BRANCH: master
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl zstd gzip

      - name: Clone dbin source
        run: |
          git clone --depth=1 https://github.com/xplshn/dbin.git

      - name: Generate metadata
        run: |
          mkdir -p out/
          run_generator() {
            folder="$1"
            generator_dir="dbin/misc/cmd/dbinRepoIndexGenerators/$folder"
            out_dir="misc/cmd/$folder"

            echo "Running generator for $folder..."

            mkdir -p "$out_dir"
            cd "$generator_dir" || exit 1

            go run . || exit 1

            cd - >/dev/null

            find "$generator_dir" -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" \) -exec gzip -k -9 {} \;
            find "$generator_dir" -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" \) -exec zstd -qf -k {} \;

            find "$generator_dir" -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" -o -name "*.gz" -o -name "*.zst" \) \
              -exec cp --parents {} "$out_dir/" \;
          }

          run_generator "1.3"
          run_generator "1.4"
          run_generator "1.5"
          run_generator "1.6"

          run_mod_generator() {
            name="$1"
            src="dbin/misc/cmd/$name"
            dest="misc/cmd/$name"
            mkdir -p "$dest"
            cd "$src" || exit 1
            go run . || exit 1
            cd - >/dev/null

            find "$src" -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" \) -exec gzip -k -9 {} \;
            find "$src" -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" \) -exec zstd -qf -k {} \;

            find "$src" -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" -o -name "*.gz" -o -name "*.zst" \) \
              -exec cp --parents {} "$dest/" \;
          }

          run_mod_generator "modMetadata"
          run_mod_generator "modMetadata-ng"
          run_mod_generator "flatpakAppStreamScrapper"

      - name: Checkout metadata repository (sparse)
        uses: actions/checkout@v4
        with:
          repository: xplshn/dbin-metadata
          path: metadata
          sparse-checkout: |
            misc/cmd/
          fetch-depth: 1

      - name: Copy over new metadata
        run: |
          cp -r misc/cmd/* metadata/misc/cmd/

      - name: Commit and Push
        run: |
          cd metadata
          git config user.name "xplshn"
          git config user.email "anto@xplshn.com.ar"
          git add misc/cmd/

          git diff --cached --quiet && {
            echo "No changes to commit"
            exit 0
          }

          now=$(TZ=UTC date "+%Y-%m-%d (%H:%M:%S)")
          git commit -m "Update repository index files <-- $now"
          git push origin master
