name: 🐧🧬 Generate Metadata 🖳🧬

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"  # Every 30 minutes

jobs:
  gen-metadata:
    runs-on: ubuntu-latest
    container: alpine:latest
    permissions:
      contents: write
      
    steps:
      - name: Install Dependencies
        run: |
          apk add --no-cache \
            git curl go bash make alpine-sdk zstd gzip
    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: master
          filter: "blob:none"
    
      - name: Setup Environment Variables
        run: |
          SYSTMP=$(dirname $(mktemp -u))
          #USER_AGENT=$(curl -sL 'https://pub.ajam.dev/repos/Azathothas/Wordlists/Misc/User-Agents/ua_chrome_macos_latest.txt')
          echo "SYSTMP=$SYSTMP" >> $GITHUB_ENV
          #echo "USER_AGENT=$USER_AGENT" >> $GITHUB_ENV
          
          # Initialize metadata generation tracking
          echo "TOTAL_GENERATORS=4" >> $GITHUB_ENV
          echo "SUCCESSFUL_GENERATORS=0" >> $GITHUB_ENV
        shell: sh
    
      - name: Run Metadata Generators
        run: |
          run_generator() {
            SCRIPT_URL="$1"
            FOLDER_NAME="$2"
            
            # Calculate initial size, handling case where directory might not exist
            BEFORE_SIZE=0
            if [ -d "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME" ]; then
              BEFORE_SIZE=$(du -b "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME" 2>/dev/null | awk '{print $1}')
            fi
            
            mkdir -p "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME"
            curl -sL "$SCRIPT_URL" -o "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME/main.go"
            cd "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME" || { echo "Failed to change directory"; return 1; }
    
            go mod init "github.com/xplshn/$FOLDER_NAME" && go mod tidy
            if go run ./main.go; then
              # Explicitly set generator success
              JSON_COUNT=$(find . -name "*.json" -type f -size +0b | wc -l)
              if [ "$JSON_COUNT" -gt 0 ]; then
                echo "Generator $FOLDER_NAME succeeded" >&2
                # Increment successful generators
                SUCCESSFUL_GENERATORS=$((SUCCESSFUL_GENERATORS + 1))
                echo "SUCCESSFUL_GENERATORS=$SUCCESSFUL_GENERATORS" >> $GITHUB_ENV
                # Generate compressed GZ files
                find . -name "*.gz" -type f -exec rm {} \;
                find . \( -name "*.json" -o -name "*.yaml" -o -name "*.cbor" -o -name "*.txt" \) -type f -size +0c -exec sh -c 'gzip -k -7 "$1" && zstd -f -k "$1"' sh {} \;
              else
                echo "No JSON files generated by $FOLDER_NAME" >&2
                return 1
              fi
            else
              echo "Generator $FOLDER_NAME failed" >&2
              return 1
            fi
    
            # Clean up intermediate files
            find . -type f ! -name "*.json" ! -name "*.yaml" ! -name "*.cbor" ! -name "*.gz" ! -name "*.zst*" ! -name "*.txt" -delete
    
            # After metadata generation, check the new size of the directory
            AFTER_SIZE=$(du -b "$GITHUB_WORKSPACE/master/misc/cmd/$FOLDER_NAME" 2>/dev/null | awk '{print $1}')
            SIZE_DIFF=$((AFTER_SIZE - BEFORE_SIZE))
    
            # Exclude files that lost >= 500 KB
            if [ "$SIZE_DIFF" -lt -512000 ]; then
              echo -e "\033[31mWarning: The size of files in $FOLDER_NAME has decreased by more than 500 KB ($SIZE_DIFF bytes). These files will not be committed.\033[0m"
              echo "$FOLDER_NAME" >> "$GITHUB_WORKSPACE/excluded_files.txt"
            fi
          }
    
          # Reset tracking files
          : > "$GITHUB_WORKSPACE/excluded_files.txt"
    
          # Run generators, allowing each to continue even if one fails
          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/modMetadata/modMetadata.go" "modMetadata" || true
          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/modMetadata-ng/modMetadata-ng.go" "modMetadata-ng" || true
          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/dbinRepoIndexGenerators/1.3/generator.go" "1.3" || true
          run_generator "https://raw.githubusercontent.com/xplshn/dbin/master/misc/cmd/AM-support/meta-to-am.go" "AM-support" || true
        shell: sh
    
      - name: Determine Metadata Generation Success
        run: |
          # Check if at least one generator succeeded
          if [ "$SUCCESSFUL_GENERATORS" -gt 0 ]; then
            echo "HAS_META=TRUE" >> $GITHUB_ENV
            echo "Metadata generation partially or fully successful"
          else
            echo "HAS_META=FALSE" >> $GITHUB_ENV
            echo "No successful metadata generators"
          fi
        shell: sh
    
      - name: Check Commit Numbers and Reset if Necessary
        if: env.HAS_META == 'TRUE'
        run: |
          cd "$GITHUB_WORKSPACE/master"
          git fetch --depth=1
          COMMIT_NUMS=$(git rev-list --count HEAD)
    
          if [ "$COMMIT_NUMS" -gt 70 ]; then
            git checkout --orphan temp
            git add --all
            git commit -m "Reset ALL Commits (Re:Init)"
            git branch -D master
            git branch -m master
            git push origin master --force
            echo "RESET_HISTORY=YES" >> $GITHUB_ENV
          else
            echo "RESET_HISTORY=NO" >> $GITHUB_ENV
          fi
        shell: sh
    
      - name: Get DateTime
        if: env.HAS_META == 'TRUE'
        run: |
          UTC_TIME=$(TZ='UTC' date +'%Y-%m-%d (%I:%M:%S %p)')
          echo "UTC_TIME=$UTC_TIME" >> $GITHUB_ENV
        shell: sh
    
      - name: Commit Files (Excluding Files with Size Loss >= 500 KB)
        if: env.HAS_META == 'TRUE'
        run: |
          cd "$GITHUB_WORKSPACE/master"
          
          # Stage all files
          git add --all
          
          # Unstage excluded files
          while IFS= read -r EXCLUDED_FILE; do
            [ -n "$EXCLUDED_FILE" ] && git reset -- "$EXCLUDED_FILE"
          done < "$GITHUB_WORKSPACE/excluded_files.txt"
          
          # Check if there are any changes to commit
          if ! git diff --cached --quiet; then
            git config user.name 'GitHub Action'
            git config user.email 'action@github.com'
            git commit -m "✅ Updated (Metadata) 🛍️🧬 <-- $UTC_TIME ⌚"
            git push origin master
          else
            echo "No changes to commit."
          fi
        shell: sh

      - name: Exit & Report Metadata Generation Status
        run: |
          if [ "$HAS_META" = "FALSE" ]; then
            echo "No successful metadata generators found."
            exit 1
          elif [ "$SUCCESSFUL_GENERATORS" -lt "$TOTAL_GENERATORS" ]; then
            echo "WARNING: Only $SUCCESSFUL_GENERATORS out of $TOTAL_GENERATORS metadata generators succeeded."
            exit 0
          fi
        shell: sh
