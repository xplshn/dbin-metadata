name: Generate Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: xplshn/dbin-metadata
      BRANCH: master

    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git jq zstd gzip
        shell: sh

      - name: Clone dbin
        run: |
          git clone --depth=1 https://github.com/xplshn/dbin.git
        shell: sh

      - name: Prepare out/ dir
        run: mkdir -p out
        shell: sh

      - name: Run Generators and Copy Output
        run: |
          run_generator() {
            version="$1"
            src_dir="dbin/misc/cmd/dbinRepoIndexGenerators/$version"
            out_dir="out/misc/cmd/$version"

            echo "Running generator $version..."
            mkdir -p "$out_dir"
            cd "$src_dir" || return 1
            go run . || { echo "Generator $version failed"; cd - >/dev/null; return 1; }
            cd - >/dev/null

            find "$src_dir" -type f \( -name '*.json' -o -name '*.yaml' -o -name '*.cbor' \) | while IFS= read -r f; do
              relname=$(basename "$f")
              cp "$f" "$out_dir/$relname"
            done
          }

          run_generator 1.3
          run_generator 1.4
          run_generator 1.5
          run_generator 1.6

          run_misc() {
            name="$1"
            src="dbin/misc/cmd/$name"
            out="out/misc/cmd/$name"
            mkdir -p "$out"
            cd "$src" || return 1
            go run . || { echo "Generator $name failed"; cd - >/dev/null; return 1; }
            cd - >/dev/null

            find "$src" -type f \( -name '*.json' -o -name '*.yaml' -o -name '*.cbor' \) | while IFS= read -r f; do
              relname=$(basename "$f")
              cp "$f" "$out/$relname"
            done
          }

          run_misc flatpakAppStreamScrapper
          run_misc modMetadata
          run_misc modMetadata-ng
        shell: sh

      - name: Upload If Changed
        run: |
          upload_if_changed() {
            file="$1"
            relpath="${file#out/}"
            echo "Processing: $relpath"
          
            remote_info=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/contents/$relpath?ref=$BRANCH")
          
            remote_sha=$(echo "$remote_info" | jq -r '.sha')
            remote_content=$(echo "$remote_info" | jq -r '.content' | base64 -d 2>/dev/null || echo "")
            local_content=$(cat "$file")
          
            [ "$remote_content" = "$local_content" ] && {
              echo "Unchanged: $relpath"
              return
            }
          
            echo "Uploading: $relpath"
            encoded=$(base64 -w 0 "$file")
          
            tmpfile="$(mktemp)"
            printf '{\n  "message": "Update %s",\n  "content": "%s",\n  "branch": "%s",\n  "sha": "%s"\n}' \
              "$relpath" "$encoded" "$BRANCH" "$remote_sha" >"$tmpfile"
          
            curl -s -X PUT -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary "@$tmpfile" \
              "https://api.github.com/repos/$REPO/contents/$relpath"
          
            rm -f "$tmpfile"
          }

          find out/ -type f | while IFS= read -r file; do
            upload_if_changed "$file"
          done
        shell: sh
