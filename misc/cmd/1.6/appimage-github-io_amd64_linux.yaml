  pkg_id: appimage.github.io.Yamagi_Quake_II.tx00100xt
  icon: https://raw.githubusercontent.com/AppImage/appimage.github.io/refs/heads/master/database/icons/Yamagi_Quake_II/icons/128x128/Quake2.png
  description: "Yamagi Quake II is an alternative client for id Software&apos;s Quake II. Our goal is to provide the best Quake II experience possible, we strive to preserve the gameplay as it was back in 1997. Thus we aim mostly for bug fixes, stability and gentle enhancements were appropriate. Yamagi Quake II has a lot of unique features. The most notables ones are: A modern OpenGL 3.2 renderer, providing a greatly enhanced look and feel. The original OpenGL 1.4 and even the Software renderers are still supported. Both 3D accelerated renderers support anisotropic filtering and multisampling anti aliasing. Full support for widescreen displays and arbitrary resolutions. The HUD can be scaled to be readable on high resolutions. Support for surround sound, from stereo up to 7.1 channels and even HRTF. The background music can be played from OGG/Vorbis files, a CD drive is no longer necessary. A rewritten savegame system. Yamagi Quake II savegames are completely reliable and backward compatible between releases as long as the principle architecture stays the same. Highly precise timings. For example, on a flat panel display with a 59.95 hertz refresh rate and vertical synchronisation (VSync) enabled Yamagi Quake II is running at exactly 59.95 frames per second. In comparison with the original client over 1.500 bugs were fixed. The Yamagi Quake II client is very well tested and stable. The dedicated server is able to run for weeks without a single restart. Last but not least the code is fully 64 bit clean and highly portable. Commercial data files are required to run the supported game. These can be aquired though a multitude of sources. See the manual for more info on this"
