- pkg: openarena-quake3e.dwfs.AppBundle
  pkg_name: OpenArena
  pkg_id: github.com.xplshn.appbundlehub.openarena-quake3e
  description: Free and open source first-person shooter
  description_long: "\n    <p>\n      OpenArena is a free and open source first-person shooter game based\n      heavily on the Quake III Arena-style deathmatch.\n      Score frags to win the game using a balanced set of weapons each designed\n      for different situations.\n      Guns include a chaingun, rocket launcher, shotgun, and railgun.\n    </p>\n    <p>\n      OpenArena's style of play is very fast and requires skill to be played\n      successfully online.\n      Gameplay modes include Deathmatch, Team Deathmatch, Tournament, Capture\n      the Flag, Elimination, CTF Elimination, Last Man Standing and Double\n      Domination.\n    </p>\n    <p>\n      This version of OpenArena is based on the Quake3e engine,\n      I do not take credit for the work done by the OpenArena team nor Eugene, who develops the Quake3e engine used by this AppBundle.\n    </p>\n    <p>\n      The OAX patch has been applied, which adds support for more screen resolutions and makes the game playable in modern systems.\n      It also includes bugfixes and improvements. Connections to unpatched servers do work and present no issues.\n    </p>\n  "
  screenshots:
