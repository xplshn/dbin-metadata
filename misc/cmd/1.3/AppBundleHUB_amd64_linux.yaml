- pkg: quake3e.dwfs.AppBundle
  pkg_name: Quake3e (engine)
  pkg_id: github.com.xplshn.appbundlehub.quake3e.dwfs.AppBundle
  app_id: quake3e
  description: Quake 3 Enhanced engine
  description_long: "This is a modern Quake III Arena engine aimed to be fast, secure and compatible with all existing Q3A mods. It is based on last non-SDL source dump of ioquake3 with latest upstream fixes applied.\n\nKey features:\n\n* Optimized OpenGL renderer\n* Optimized Vulkan renderer\n* Raw mouse input support, enabled automatically instead of DirectInput(\\in_mouse 1) if available\n* Unlagged mouse events processing, can be reverted by setting \\in_lagged 1\n* \\in_minimize - hotkey for minimize/restore main window (win32-only, direct replacement for Q3Minimizer)\n* \\video-pipe - to use external ffmpeg binary as an encoder for better quality and smaller output files\n* Significantly reworked QVM (Quake Virtual Machine)\n* Improved server-side DoS protection, much reduced memory usage\n* Raised filesystem limits (up to 20,000 maps can be handled in a single directory)\n* Reworked Zone memory allocator, no more out-of-memory errors\n* Non-intrusive support for SDL2 backend (video, audio, input), selectable at compile time\n* Tons of bug fixes and other improvements\n* Vulkan renderer based on Quake-III-Arena-Kenny-Edition with many additions:\n\n* High-quality per-pixel dynamic lighting\n* Very fast flares (\\r_flares 1)\n* Anisotropic filtering (\\r_ext_texture_filter_anisotropic)\n* Greatly reduced API overhead (call/dispatch ratio)\n* Flexible vertex buffer memory management to allow loading huge maps\n* Multiple command buffers to reduce processing bottlenecks\n* Reversed depth buffer to eliminate z-fighting on big maps\n* Merged lightmaps (atlases)\n* Multitexturing optimizations\n* Static world surfaces cached in VBO (\\r_vbo 1)\n* Useful debug markers for tools like RenderDoc\n* Fixed framebuffer corruption on some Intel iGPUs\n* Offscreen rendering, enabled with \\r_fbo 1, all following requires it enabled:\n\n* ScreenMap texture rendering - to create realistic environment reflections\n* Multisample anti-aliasing (\\r_ext_multisample)\n* Supersample anti-aliasing (\\r_ext_supersample)\n* Per-window gamma-correction which is important for screen-capture tools like OBS\n* You can minimize game window any time during \\video|\\video-pipe recording\n* High dynamic range render targets (\\r_hdr 1) to avoid color banding\n* Bloom post-processing effect\n* Arbitrary resolution rendering\n* Greyscale mode"
  download_url: https://github.com/xplshn/AppBundleHUB/releases/download/v120-20250626113137/quake3e.dwfs.AppBundle
  size: 8.36 MB
  bsum: e7a5f8b95ba104774f719eeb60f581e1936d0d5c4bf8d92cb78c67fabada2247
  shasum: c275d371a5a2ddaf23b96848770563a7cfe0a7bb1bdc737a024c0db40c148395
  build_date: 2025-05-29 00:00:00 +0000 UTC
